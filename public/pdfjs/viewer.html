<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=no,viewport-fit=cover"><title>PDF</title>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#2a2a2a;overscroll-behavior:none}
#toolbar{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:4px;padding:4px 8px;padding-left:max(8px,env(safe-area-inset-left,8px));padding-right:max(8px,env(safe-area-inset-right,8px));padding-bottom:max(4px,env(safe-area-inset-bottom,4px));background:rgba(0,0,0,.85);color:#fff;font:12px sans-serif;height:28px;box-sizing:border-box}
#toolbar button{background:#555;border:none;color:#fff;padding:2px 8px;border-radius:3px;font-size:11px;cursor:pointer;white-space:nowrap}
#toolbar button:hover{background:#777}
#toolbar input{background:#555;border:none;color:#fff;padding:2px 4px;border-radius:3px;font-size:11px;width:36px;text-align:center}
#toolbar select{background:#555;border:none;color:#fff;padding:2px 4px;border-radius:3px;font-size:11px;max-width:70px}
#toolbar label{font-size:10px;opacity:.7;white-space:nowrap}
#viewerContainer{position:absolute;top:0;left:0;right:0;bottom:28px;overflow:hidden;touch-action:none}
#wrapper{transform-origin:0 0}
canvas{display:block;box-shadow:0 2px 12px rgba(0,0,0,.5)}
</style></head><body>
<div id="toolbar">
  <button id="prev">◀</button>
  <span id="pageInfo">-</span>/<span id="totalPages">-</span>
  <button id="next">▶</button>
  <input id="pageInput" type="number" min="1" value="1">
  <button id="zoomOut">−</button>
  <select id="scaleSelect">
    <option value="page-width" selected>适合宽度</option>
    <option value="page-fit">适合长度</option>
    <option value="3">300%</option>
    <option value="2">200%</option>
    <option value="1.5">150%</option>
    <option value="1">100%</option>
  </select>
  <button id="zoomIn">＋</button>
  <span style="font-size:9px;opacity:.5">清晰度</span>
  <span id="loading" style="font-size:10px;opacity:.7;margin-left:auto"></span>
<button id="fullscreenBtn" style="background:#555;border:none;color:#fff;padding:2px 8px;border-radius:3px;font-size:11px;cursor:pointer;white-space:nowrap;margin-left:4px">⛶ 全屏</button>
</div>
<div id="viewerContainer"><div id="wrapper"></div></div>
<script src="./panzoom.min.js"></script>
<script type="module">
import { getDocument, GlobalWorkerOptions } from './pdf.min.mjs';
GlobalWorkerOptions.workerSrc = './pdf.worker.min.mjs';

const key=(new URL(location.href)).searchParams.get('key')||'';
const file=(new URL(location.href)).searchParams.get('file')||'';
let pdfUrl=key?sessionStorage.getItem(key)||'':decodeURIComponent(file||'');
if(!pdfUrl){pdfUrl='https://pan.tantantan.tech/pdf-preview/sta/新媒体素材/可复用文件收集/未来梦扫描件/《未来梦》Vol.20.pdf?sign=ZgQCQ-LbsGyKIZhKt9_uCDkoxF_hbzi_R41XBTBZHPo=:0'}
if(key)sessionStorage.removeItem(key);
document.title=decodeURIComponent(pdfUrl.split('/').pop()||'PDF');

const container=document.getElementById('viewerContainer'),
      wrapper=document.getElementById('wrapper'),
      loading=document.getElementById('loading'),
      pageInput=document.getElementById('pageInput'),
      scaleSelect=document.getElementById('scaleSelect');

let pdf=null,pageNum=1,total=0,panzoom=null,wh=null;
const cache=new Map();

// Panzoom 初始化/重置
function initPan(){
  if(panzoom){panzoom.destroy();panzoom=null}
  panzoom=Panzoom(wrapper,{
    maxScale:5,minScale:0.3,contain:'outside',
    pinchGesture:true,step:0.15
  });
  wh=e=>{if(e.ctrlKey||e.metaKey)panzoom.zoomWithWheel(e);else e.preventDefault()};
  container.addEventListener('wheel',wh,{passive:false});
}

// 销毁 Panzoom（翻页时）
function killPan(){
  if(panzoom){panzoom.destroy();panzoom=null;container.removeEventListener('wheel',wh)}
  wrapper.style.transform='';
}

async function loadPdf(){
  loading.textContent='⏳';
  const task=getDocument({url:pdfUrl,disableRange:true,disableStream:false});
  task.onProgress=p=>{if(p.total)loading.textContent=Math.round(100*p.loaded/p.total)+'%'};
  pdf=await task.promise;
  total=pdf.numPages;
  document.getElementById('totalPages').textContent=total;
  pageInput.max=total;
  loading.textContent='';renderPage(1);
}
async function renderPage(num){
  if(cache.has(num)){showCached(num);updateUI(num);return}
  wrapper.innerHTML='';
  const page=await pdf.getPage(num);
  let vpScale=1;
  if(scaleSelect.value==='page-width'){vpScale=(container.clientWidth-20)/page.getViewport({scale:1}).width}
  else if(scaleSelect.value==='page-fit'){vpScale=Math.min((container.clientWidth-20)/page.getViewport({scale:1}).width,(container.clientHeight-40)/page.getViewport({scale:1}).height)}
  else{vpScale=parseFloat(scaleSelect.value)||1}
  const vp=page.getViewport({scale:vpScale});
  const canvas=document.createElement('canvas');
  canvas.height=vp.height;canvas.width=vp.width;
  wrapper.appendChild(canvas);wrapper.style.width=vp.width+'px';wrapper.style.height=vp.height+'px';
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  cache.set(num,canvas);if(cache.size>12){const[[k]]=cache;cache.delete(k)}
  updateUI(num);
  initPan();
  setTimeout(()=>{for(let i=1;i<=4;i++){const n=num+i;if(n<=total&&!cache.has(n)){pdf.getPage(n).then(pp=>{const vs=parseFloat(scaleSelect.value)||1;const vv=pp.getViewport({scale:vs});const cc=document.createElement('canvas');cc.height=vv.height;cc.width=vv.width;pp.render({canvasContext:cc.getContext('2d'),viewport:vv}).promise.then(()=>{if(cache.size<12)cache.set(n,cc)})})}}},300);
}
function showCached(num){killPan();wrapper.innerHTML='';wrapper.appendChild(cache.get(num));wrapper.style.width=cache.get(num).width+'px';wrapper.style.height=cache.get(num).height+'px';initPan()}
function updateUI(num){pageNum=num;document.getElementById('pageInfo').textContent=num;pageInput.value=num}
function goPage(n){if(n<1||n>total)return;killPan();cache.clear();pageNum=n;renderPage(n)}
function applyScale(s){
  scaleSelect.value=s;killPan();cache.clear();renderPage(pageNum);
}

document.getElementById('prev').onclick=()=>goPage(pageNum-1);
document.getElementById('next').onclick=()=>goPage(pageNum+1);
pageInput.onchange=()=>goPage(parseInt(pageInput.value,10)||1);
document.getElementById('zoomIn').onclick=()=>{const s=parseFloat(scaleSelect.value)||1;applyScale(Math.min(4,s*1.3))};
document.getElementById('zoomOut').onclick=()=>{const s=parseFloat(scaleSelect.value)||1;applyScale(Math.max(0.25,s/1.3))};
scaleSelect.onchange=()=>{const v=scaleSelect.value;if(v==='page-width'||v==='page-fit'){applyScale(v)}else{applyScale(v)}};
// iOS Safari 的 Fullscreen API 仅对 video 元素有效，对普通元素调用静默无反应
// 因此 iOS 全系直接用 postMessage 通知父页面做 CSS 全屏
const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

document.getElementById('fullscreenBtn').onclick=()=>{
  if (isIOS) {
    window.parent.postMessage({ type: 'toggle-pdf-fullscreen' }, '*');
    return;
  }
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
};

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')goPage(pageNum+1);
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp')goPage(pageNum-1);
  else if(e.key==='+'||e.key==='='){const s=parseFloat(scaleSelect.value)||1;applyScale(Math.min(4,s*1.3))}
  else if(e.key==='-'){const s=parseFloat(scaleSelect.value)||1;applyScale(Math.max(0.25,s/1.3))}
  else if(e.key==='f'&&!e.ctrlKey&&!e.metaKey){
    if(isIOS){window.parent.postMessage({type:'toggle-pdf-fullscreen'},'*');return}
    if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{})}
    else{document.exitFullscreen().catch(()=>{})}
  }
});


loadPdf().catch(e=>{wrapper.innerHTML=`<div style="color:#f66;text-align:center;padding:40px">加载失败: ${e.message}</div>`});
</script></body></html>
